name: Release

# Push a vX.Y.Z tag → build portable static binaries, package them, and publish
# a GitHub Release with auto-extracted notes + checksums. See ROD-145.
#
#   git tag v0.1.0 && git push --tags     # the real thing (Rod's call)
#   Actions ▸ Release ▸ Run workflow       # rehearsal: builds + packages, no publish
#
# Linux: static musl (x86_64 + aarch64), cross-built on ubuntu.
# macOS: both arches off the arm64 macos-14 runner with bundled SQLite —
# aarch64 native (built + smoke-run), x86_64 cross (-Dtarget, otool-verified).
# GitHub is sunsetting the Intel macos-13 runner, so we don't depend on it.
# The unbundled-sqlite segfault that kept Darwin out is fixed (ROD-212).

on:
  push:
    tags: ['v*']
  workflow_dispatch: {}   # manual rehearsal: runs guard + build, never publishes

jobs:
  # ── Fail fast before burning build minutes ─────────────────────────────────
  # build.zig.zon is the single version source, so these guards cover what the
  # build cannot: tag drift and a missing changelog (push events only; the
  # rehearsal path skips them so it can run against an unpromoted CHANGELOG).
  guard:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve in-repo version
        id: version
        run: |
          version="$(grep -oP '^\s*\.version = "\K[^"]+' build.zig.zon)"
          [ -n "$version" ] || { echo "::error::could not parse .version from build.zig.zon"; exit 1; }
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "in-repo version: $version"

      - name: Guard — tag matches in-repo version
        if: github.event_name == 'push'
        run: |
          expected="v${{ steps.version.outputs.version }}"
          if [ "$GITHUB_REF_NAME" != "$expected" ]; then
            echo "::error::tag '$GITHUB_REF_NAME' != in-repo version '$expected': bump build.zig.zon, or fix the tag"
            exit 1
          fi
          echo "tag $GITHUB_REF_NAME matches in-repo version"

      - name: Guard — CHANGELOG has a non-empty section for this version
        if: github.event_name == 'push'
        run: |
          v="${{ steps.version.outputs.version }}"
          grep -qE "^## \[$v\]" CHANGELOG.md \
            || { echo "::error::no '## [$v]' section in CHANGELOG.md — promote [Unreleased] before tagging"; exit 1; }
          body="$(awk -v ver="$v" '$0 ~ "^## \\[" ver "\\]" {g=1; next} g && /^## \[/ {exit} g && /^\[[^]]+\]:/ {exit} g {print}' CHANGELOG.md)"
          [ -n "$(printf '%s' "$body" | tr -d '[:space:]')" ] \
            || { echo "::error::'## [$v]' section is empty"; exit 1; }
          echo "CHANGELOG section [$v] present and non-empty"

  # ── Build + package one static tarball per target ──────────────────────────
  build:
    needs: guard
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # `smoke` flags targets we can actually execute on their runner (native
        # arch). Cross builds (aarch64-linux on x86 ubuntu; x86_64-macos on the
        # arm64 macos-14 runner) are built + linkage-verified but not run.
        include:
          - { target: x86_64-linux-musl,  runner: ubuntu-latest, smoke: true  }
          - { target: aarch64-linux-musl, runner: ubuntu-latest, smoke: false }
          - { target: aarch64-macos,      runner: macos-14,      smoke: true  }
          - { target: x86_64-macos,       runner: macos-14,      smoke: false }
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      # No libsqlite3-dev step: -Dbundle-sqlite compiles its own SQLite, so the
      # release build needs nothing from the system beyond what musl static gives.
      - name: Build (bundled sqlite + stripped; static musl on Linux)
        run: zig build -Dbundle-sqlite -Dstrip -Doptimize=ReleaseSafe -Dtarget=${{ matrix.target }} --prefix out

      - name: Verify Linux binary is fully static
        if: runner.os == 'Linux'
        run: |
          file out/bin/zigoku
          if readelf -dW out/bin/zigoku 2>/dev/null | grep -q NEEDED; then
            echo "::error::binary has dynamic NEEDED entries — not static"; exit 1
          fi
          echo "static: no dynamic dependencies"

      # Ad-hoc sign both mac binaries. Zig's linker ad-hoc-signs the native
      # aarch64-macos build (Apple Silicon's kernel mandates a signature to
      # exec at all) but leaves the cross-built x86_64-macos binary UNSIGNED —
      # inconsistent, fails `codesign --verify`, and invites Gatekeeper friction
      # outside brew's quarantine-stripping. The ROD-150 Homebrew formula's
      # on_intel bottle needs a verifiable artifact, so sign + gate both arches.
      - name: Ad-hoc sign + verify macOS binary
        if: runner.os == 'macOS'
        run: |
          codesign --force --sign - out/bin/zigoku
          codesign --verify --verbose out/bin/zigoku
          echo "ad-hoc signature present and valid"

      # macOS can't be fully static (libSystem is always dynamic), so the gate
      # checks the thing that actually mattered for ROD-212: sqlite is compiled
      # in, not dynamically linked against a (possibly missing) libsqlite3.dylib.
      - name: Verify macOS binary bundles sqlite (no external libsqlite3)
        if: runner.os == 'macOS'
        run: |
          otool -L out/bin/zigoku
          if otool -L out/bin/zigoku | grep -qi libsqlite3; then
            echo "::error::macOS binary links libsqlite3 dynamically — bundled-sqlite regression (the ROD-212 segfault cause)"; exit 1
          fi
          echo "sqlite is bundled: no external libsqlite3 dependency"

      # Only the native-arch targets can execute on their runner (see `smoke`).
      # ROD-221: assert the explicit `--version` line carries the in-repo version,
      # not just exit 0 — the handler is intended behaviour now, not a fallthrough.
      - name: Smoke-run on native targets
        if: matrix.smoke
        run: |
          out="$(./out/bin/zigoku --version)"
          echo "$out"
          case "$out" in
            "zigoku v${{ needs.guard.outputs.version }}"*) echo "version line OK" ;;
            *) echo "::error::--version did not print 'zigoku v${{ needs.guard.outputs.version }}'"; exit 1 ;;
          esac

      - name: Package tarball
        run: |
          v="${{ needs.guard.outputs.version }}"
          name="zigoku-v${v}-${{ matrix.target }}"
          mkdir -p "dist/$name"
          cp out/bin/zigoku LICENSE README.md "dist/$name/"
          # Bundled third-party code ships its license with the binary: libwebp
          # is BSD-3-Clause plus an additional patent grant, both of which the
          # license requires we reproduce in materials distributed with it (ROD-244).
          mkdir -p "dist/$name/licenses"
          cp src/c/webp/COPYING "dist/$name/licenses/LICENSE.libwebp"
          cp src/c/webp/PATENTS "dist/$name/licenses/PATENTS.libwebp"
          tar -C dist -czf "dist/$name.tar.gz" "$name"
          rm -rf "dist/$name"
          # Informational only (the release job re-aggregates on ubuntu); macOS
          # runners ship `shasum`, not GNU `sha256sum`.
          if command -v sha256sum >/dev/null 2>&1; then
            ( cd dist && sha256sum "$name.tar.gz" )
          else
            ( cd dist && shasum -a 256 "$name.tar.gz" )
          fi

      - name: Upload tarball artifact
        uses: actions/upload-artifact@v4
        with:
          name: tarball-${{ matrix.target }}
          path: dist/*.tar.gz
          if-no-files-found: error

  # ── Publish — tag pushes only; the rehearsal path stops at `build` ─────────
  release:
    needs: [guard, build]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the release + upload assets
    steps:
      - uses: actions/checkout@v4

      - name: Download all tarballs
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: tarball-*
          merge-multiple: true

      - name: Aggregate checksums
        run: |
          cd dist
          sha256sum *.tar.gz | tee sha256sums.txt

      - name: Extract release notes from CHANGELOG
        run: |
          v="${{ needs.guard.outputs.version }}"
          awk -v ver="$v" '$0 ~ "^## \\[" ver "\\]" {g=1; next} g && /^## \[/ {exit} g && /^\[[^]]+\]:/ {exit} g {print}' CHANGELOG.md > notes.md
          echo "----- release notes -----"; cat notes.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: zigoku ${{ github.ref_name }}
          body_path: notes.md
          files: |
            dist/*.tar.gz
            dist/sha256sums.txt
          fail_on_unmatched_files: true

  # ── Homebrew tap auto-bump — tag pushes only ──────────────────────────────
  # Push the new version + per-arch sha256 into vantroy/homebrew-zigoku so
  # `brew install vantroy/zigoku/zigoku` tracks the release. Uses a write
  # deploy key (HOMEBREW_TAP_DEPLOY_KEY) scoped to the tap alone — the default
  # GITHUB_TOKEN can't push cross-repo. Source-of-truth: packaging/homebrew/. (ROD-150)
  update-tap:
    needs: [guard, release]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch release checksums
        run: |
          v="${{ needs.guard.outputs.version }}"
          # --retry-all-errors covers the transient 404 window where the release
          # is published (API) but the download CDN hasn't caught up yet.
          curl -fsSL --retry 5 --retry-delay 3 --retry-all-errors \
            "https://github.com/vantroy/zigoku/releases/download/v${v}/sha256sums.txt" -o sha256sums.txt
          cat sha256sums.txt

      - name: Set up tap deploy key
        env:
          DEPLOY_KEY: ${{ secrets.HOMEBREW_TAP_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/tap_key
          chmod 600 ~/.ssh/tap_key
          ssh-keyscan -t ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Bump formula in tap + push
        env:
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/tap_key -o IdentitiesOnly=yes"
        run: |
          v="${{ needs.guard.outputs.version }}"
          git clone git@github.com:vantroy/homebrew-zigoku.git tap
          arm=$(awk '/aarch64-macos/ {print $1}' sha256sums.txt)
          intel=$(awk '/x86_64-macos/ {print $1}' sha256sums.txt)
          if [ -z "$arm" ] || [ -z "$intel" ]; then
            echo "::error::missing macOS checksums in sha256sums.txt"; exit 1
          fi
          f=tap/Formula/zigoku.rb
          # Bump the version embedded in both URLs (no `version` stanza — Homebrew
          # scans it from the URL; a redundant stanza fails `brew audit --strict`).
          sed -i -E "/^[[:space:]]*url /s/v[0-9]+\.[0-9]+\.[0-9]+/v${v}/g" "$f"
          # Per-arch sha256: each arch's url line (it carries the target triple)
          # marks which arch the *following* sha256 line belongs to.
          awk -v arm="$arm" -v intel="$intel" '
            /aarch64-macos/ { cur="arm" }
            /x86_64-macos/  { cur="intel" }
            /^[[:space:]]*sha256 / {
              if (cur=="arm")   { sub(/sha256 "[^"]*"/, "sha256 \"" arm "\"") }
              if (cur=="intel") { sub(/sha256 "[^"]*"/, "sha256 \"" intel "\"") }
            }
            { print }
          ' "$f" > "$f.tmp" && mv "$f.tmp" "$f"
          echo "----- bumped formula -----"; cat "$f"
          cd tap
          git config user.name "zigoku-release"
          git config user.email "actions@users.noreply.github.com"
          git add Formula/zigoku.rb
          if git diff --cached --quiet; then
            echo "formula already current for v${v} — nothing to push"
          else
            git commit -m "zigoku v${v}"
            git push origin main
          fi

  # ── AUR auto-publish (tag pushes only) ────────────────────────────────────
  # Mirror of update-tap for the AUR: bump packaging/aur/zigoku/PKGBUILD to the
  # release, regenerate .SRCINFO, and push both to the AUR git repo so
  # `paru -S zigoku` tracks the tag. Runs in an Arch container because .SRCINFO
  # must come from `makepkg --printsrcinfo`; a hand-edited .SRCINFO that drifts
  # from PKGBUILD is exactly what AUR rejects on. Uses AUR_SSH_PRIVATE_KEY (its
  # public half is registered on the AUR account). Does NOT write the bump back
  # to master: the in-repo PKGBUILD is the template, the AUR repo is the deployed
  # copy, the same split as packaging/homebrew/ vs the tap. (ROD-408)
  update-aur:
    needs: [guard, release]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    permissions:
      contents: read
    steps:
      # git for a real checkout with history; openssh for the AUR push. base-devel
      # already carries makepkg. Full -Syu since the container is ephemeral.
      - name: Install git + ssh
        run: pacman -Syu --noconfirm --needed git openssh

      - uses: actions/checkout@v4

      - name: Compute source-archive sha256
        id: sha
        env:
          VERSION: ${{ needs.guard.outputs.version }}
        run: |
          v="$VERSION"
          url="https://github.com/vantroy/zigoku/archive/refs/tags/v${v}.tar.gz"
          # The tag exists at push time, but codeload's CDN can 404 for a beat
          # right after publish, so ride it out. Bounded timeouts so a stalled
          # connection can't hang the job to the 6h default.
          curl -fsSL --connect-timeout 30 --max-time 120 \
            --retry 5 --retry-delay 3 --retry-all-errors "$url" -o src.tar.gz
          # curl -f gates on HTTP status, not body: a 200 carrying a CDN
          # interstitial would hash clean. Refuse anything that isn't a real
          # gzip tarball before we trust the checksum.
          tar tzf src.tar.gz >/dev/null 2>&1 \
            || { echo "::error::downloaded archive is not a valid gzip tarball"; exit 1; }
          sum="$(sha256sum src.tar.gz | awk '{print $1}')"
          echo "source-archive sha256 for v${v}: ${sum}"
          echo "sum=${sum}" >> "$GITHUB_OUTPUT"

      # If build.zig.zon bumped a dep but the PKGBUILD pins didn't follow, the
      # AUR build would resolve the wrong source. Catch that here, not in users'
      # chroots. zigimg is transitive (pinned in vaxis's zon, not zigoku's), so
      # it moves only with the vaxis pin and isn't cross-checkable here.
      - name: Verify PKGBUILD dep pins match build.zig.zon
        run: |
          pk=packaging/aur/zigoku/PKGBUILD
          fail=0
          check() {  # label  pkg-commit  pkg-hash  zon-commit  zon-hash
            if [ "$2" != "$4" ] || [ "$3" != "$5" ]; then
              echo "::error::$1 pin drift: PKGBUILD ($2 / $3) != build.zig.zon ($4 / $5)"
              fail=1
            fi
          }
          pv_c=$(grep -oP 'libvaxis\.git#commit=\K[0-9a-f]+' "$pk")
          pv_h=$(grep -oP "_vaxis_hash='\K[^']+" "$pk")
          pu_c=$(grep -oP 'uucode\.git#commit=\K[0-9a-f]+' "$pk")
          pu_h=$(grep -oP "_uucode_hash='\K[^']+" "$pk")
          zv_c=$(grep -oP 'libvaxis#\K[0-9a-f]+' build.zig.zon)
          zv_h=$(grep -oP '"\Kvaxis-[^"]+' build.zig.zon)
          zu_c=$(grep -oP 'uucode#\K[0-9a-f]+' build.zig.zon)
          zu_h=$(grep -oP '"\Kuucode-[^"]+' build.zig.zon)
          # Fail closed if any extraction came back empty (a PKGBUILD/zon format
          # change), so an empty-vs-empty comparison can't rubber-stamp the guard.
          for x in "$pv_c" "$pv_h" "$pu_c" "$pu_h" "$zv_c" "$zv_h" "$zu_c" "$zu_h"; do
            [ -n "$x" ] || { echo "::error::a dep-pin extraction came back empty"; exit 1; }
          done
          check vaxis  "$pv_c" "$pv_h" "$zv_c" "$zv_h"
          check uucode "$pu_c" "$pu_h" "$zu_c" "$zu_h"
          [ "$fail" = 0 ] || { echo "bump the PKGBUILD dep pins to match, then re-run"; exit 1; }
          echo "dep pins consistent"

      - name: Bump PKGBUILD + regenerate .SRCINFO
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          SUM: ${{ steps.sha.outputs.sum }}
        run: |
          v="$VERSION"
          sum="$SUM"
          cd packaging/aur/zigoku
          sed -i -E "s/^pkgver=.*/pkgver=${v}/" PKGBUILD
          sed -i -E "s/^pkgrel=.*/pkgrel=1/" PKGBUILD
          # Only sha256sums[0] is a 64-hex literal; the git-source entries are
          # 'SKIP'. So this pattern hits the tarball checksum and nothing else.
          sed -i -E "s/^([[:space:]]*)'[0-9a-f]{64}'/\1'${sum}'/" PKGBUILD
          echo "----- bumped PKGBUILD -----"; cat PKGBUILD
          # Assert the sha256 actually landed: it's the one value that changes
          # every release and comes from outside the repo, so verify the sed
          # rather than trust it (a no-op sed would regenerate a self-consistent
          # .SRCINFO that AUR accepts, then fail every user's makepkg integrity).
          grep -q "'${sum}'" PKGBUILD \
            || { echo "::error::sha256 bump did not land in PKGBUILD"; exit 1; }
          # makepkg refuses to run as root; run --printsrcinfo as an unprivileged
          # user. It's a pure parse of PKGBUILD: no network, no build.
          useradd -m builder
          chown -R builder .
          su builder -c 'makepkg --printsrcinfo' > .SRCINFO
          echo "----- .SRCINFO -----"; cat .SRCINFO
          # The regenerated .SRCINFO must carry this version, else the push would
          # be the pkgver/.SRCINFO mismatch AUR rejects. Anchor to end-of-line so
          # v0.4.6 can't match a v0.4.60 line.
          grep -q "pkgver = ${v}$" .SRCINFO \
            || { echo "::error::.SRCINFO did not regenerate to v${v}"; exit 1; }

      - name: Set up AUR deploy key
        env:
          AUR_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_KEY" > ~/.ssh/aur_key
          chmod 600 ~/.ssh/aur_key
          ssh-keyscan -t ed25519 aur.archlinux.org >> ~/.ssh/known_hosts 2>/dev/null

      - name: Push to AUR
        env:
          VERSION: ${{ needs.guard.outputs.version }}
          GIT_SSH_COMMAND: "ssh -i ~/.ssh/aur_key -o IdentitiesOnly=yes"
        run: |
          v="$VERSION"
          git clone ssh://aur@aur.archlinux.org/zigoku.git aur
          cp packaging/aur/zigoku/PKGBUILD packaging/aur/zigoku/.SRCINFO aur/
          cd aur
          git config user.name "zigoku-release"
          git config user.email "actions@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "AUR already current for v${v}, nothing to push"
            echo "AUR already current for v${v}." >> "$GITHUB_STEP_SUMMARY"
          else
            git commit -m "zigoku v${v}"
            git push origin master
            echo "Pushed zigoku v${v} to the AUR." >> "$GITHUB_STEP_SUMMARY"
          fi

name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # store.zig links libsqlite3 via raw C interop; the test executables
      # inherit that linkage, so the dev headers must be present.
      - name: Install libsqlite3
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Test
        run: zig build test --summary all

  # Real Darwin build + test on macOS hardware (ROD-149, ROD-212). The `.macos`
  # arms in src/paths.zig are comptime-dead on Linux, so they're only analyzed
  # here; the @cImport surface (stdlib.h/sys/stat.h) resolves against libSystem,
  # not glibc. macOS defaults to -Dbundle-sqlite (build.zig) — Apple's system
  # libsqlite3 is THREADSAFE=2, unsafe for store.zig's shared connection handle —
  # so this compiles the vendored amalgamation and needs no system sqlite or
  # pkg-config. mpv isn't needed — nothing in build/test execs it.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Test
        run: zig build test --summary all

name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  # Formatting gate (ROD-223). A pure lint — no libsqlite3, no build — so it runs
  # fast and parallel to the build/test jobs. `zig fmt` skips .zig-cache/zig-out,
  # so `.` checks exactly the source tree. Pins the same Zig as the other jobs;
  # fmt output is version-sensitive, so a drifting toolchain here would be noise.
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Check formatting
        run: zig fmt --check .

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # store.zig links libsqlite3 via raw C interop; the test executables
      # inherit that linkage, so the dev headers must be present.
      - name: Install libsqlite3
        run: sudo apt-get update && sudo apt-get install -y libsqlite3-dev

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Test
        run: zig build test --summary all

  # Real Darwin build + test on macOS hardware (ROD-149, ROD-212). The `.macos`
  # arms in src/paths.zig are comptime-dead on Linux, so they're only analyzed
  # here; the @cImport surface (stdlib.h/sys/stat.h) resolves against libSystem,
  # not glibc. macOS defaults to -Dbundle-sqlite (build.zig) — Apple's system
  # libsqlite3 is THREADSAFE=2, unsafe for store.zig's shared connection handle —
  # so this compiles the vendored amalgamation and needs no system sqlite or
  # pkg-config. mpv isn't needed — nothing in build/test execs it.
  test-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build
        run: zig build

      - name: Test
        run: zig build test --summary all

      # Regression guard for ROD-310: a non-zero mpv exit must not double-join the
      # IPC watcher thread. macOS pthread_join panics ("reached unreachable code")
      # on a second join; Linux survives it, so ONLY a real Darwin run catches this
      # class of threading bug — the unit suite is structurally blind to it. Drives
      # the real player.play() ×3 against a fake mpv that exits 2 (src/spikes/
      # retry_repro.zig); a panic here fails CI. Debug (max checks) + ReleaseSafe
      # (the release mode) both, since the crash predates optimize-mode differences.
      - name: Regression — mpv nonzero exit must not double-join the watcher (ROD-310)
        run: |
          chmod +x scripts/fake-mpv-exit2.py
          zig build spike-retry -- "$PWD/scripts/fake-mpv-exit2.py"
          zig build spike-retry -Doptimize=ReleaseSafe -- "$PWD/scripts/fake-mpv-exit2.py"

# ROD-310 — throwaway macOS repro of the ROD-309 retry-path panic.
# Manual trigger only. Runs the spike-retry harness (real player.play() ×3 vs a
# fake mpv that exits 2) on a real Apple-Silicon runner, in both Debug (max safety
# checks + full backtrace) and ReleaseSafe (the mode the Homebrew build ships).
# The spike builds UNSTRIPPED, so a panic here yields a stack trace naming the
# exact unreachable — which the user's stripped release could not. Delete once
# ROD-310 is root-caused.
name: rod310-repro

on:
  push:
    branches: [rod-310] # auto-run the repro on every push to this debug branch
  workflow_dispatch: {}

jobs:
  repro-macos:
    runs-on: macos-14 # Apple Silicon (arm64) — matches the user + the release build
    steps:
      - uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Write the fake mpv (creates the IPC socket, accepts the watcher, exits 2)
        run: |
          cat > fake-mpv.py <<'PY'
          #!/usr/bin/env python3
          import sys, os, socket, time
          ipc = None
          log = None
          for a in sys.argv[1:]:
              if a.startswith("--input-ipc-server="):
                  ipc = a.split("=", 1)[1]
              elif a.startswith("--log-file="):
                  log = a.split("=", 1)[1]
          if log:
              try:
                  open(log, "w").write("[fake-mpv] pretending the CDN 403'd\n")
              except OSError:
                  pass
          if ipc:
              try:
                  if os.path.exists(ipc):
                      os.unlink(ipc)
                  srv = socket.socket(socket.AF_UNIX, socket.SOCK_STREAM)
                  srv.bind(ipc)
                  srv.listen(1)
                  srv.settimeout(2.0)
                  try:
                      conn, _ = srv.accept()
                      conn.settimeout(0.3)
                      try:
                          conn.recv(4096)
                      except socket.timeout:
                          pass
                      time.sleep(0.1)
                      conn.close()
                  except socket.timeout:
                      pass
                  srv.close()
              except OSError:
                  pass
          sys.exit(2)
          PY
          chmod +x fake-mpv.py
          python3 --version
          # Self-test: it must exec via its shebang and exit 2, or the spike will
          # short-circuit on InvalidExe and the repro is meaningless. `|| rc=$?`
          # keeps the expected non-zero from tripping `set -e` and aborting the job.
          rc=0
          ./fake-mpv.py --input-ipc-server=/tmp/rod310-selftest.sock || rc=$?
          echo "fake mpv exit=$rc (expect 2)"

      - name: Repro — Debug (full safety checks + backtrace)
        continue-on-error: true
        run: |
          echo "::group::spike-retry Debug"
          zig build spike-retry -- "$PWD/fake-mpv.py"; echo "spike exit=$?"
          echo "::endgroup::"

      - name: Repro — ReleaseSafe (the mode the macOS release ships)
        continue-on-error: true
        run: |
          echo "::group::spike-retry ReleaseSafe"
          zig build spike-retry -Doptimize=ReleaseSafe -- "$PWD/fake-mpv.py"; echo "spike exit=$?"
          echo "::endgroup::"
